# メタ情報
metadata:
  version: "1.0.0"
  created_at: "2026-02-16"
  description: |
    ConPass RAGパイプラインの検索品質を評価するためのテストクエリセット。
    expected_contractsとrelevanceフィールドは、実データのcontract_idを用いて
    手動でアノテーションする必要があります。

    使用方法:
    1. 本番Qdrantからテスト用ディレクトリのcontract_idを確認
    2. 各クエリに対して人手で関連契約を判定
    3. expected_contractsとrelevanceを記入
    4. evaluation_runner.pyを実行して評価

  annotation_guide: |
    アノテーション手順:
    - 各クエリについて、関連する契約IDをexpected_contractsに記入
    - relevanceに契約IDと関連度スコア（2=高, 1=中）のマッピングを記入
    - 自信がない場合は1（中関連）としてマーク
    - 同義語カテゴリのクエリは、対応するクエリと同じ結果を期待
