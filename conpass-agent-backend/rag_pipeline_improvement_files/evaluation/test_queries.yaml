# ConPass RAG パイプライン評価クエリセット
# 各クエリに対する期待結果と関連度スコアを定義
#
# relevance スコア:
#   2 = 高関連（クエリに直接回答する契約）
#   1 = 中関連（部分的に関連する契約）
#   0 = 非関連
