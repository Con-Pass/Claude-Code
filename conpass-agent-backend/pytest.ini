[pytest]
asyncio_mode = auto
filterwarnings =
    ignore::RuntimeWarning:coverage.collector
    ignore::RuntimeWarning:urllib.parse
    ignore::RuntimeWarning:PIL.Image
    ignore::RuntimeWarning:asyncio.events
    ignore::RuntimeWarning:_pytest.unraisableexception
    ignore::RuntimeWarning:unittest.mock
    ignore::RuntimeWarning:contextlib
norecursedirs = app/services/chatbot/tools
