name: Deploy to Cloud Run production env

on:
  push:
    branches:
      - prod

jobs:
  dockerize-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Google Cloud Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: ${{ secrets.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -f docker/worker/Dockerfile -t ${{ secrets.DOCKER_IMAGE_URL_CELERY }}:$GITHUB_SHA .
          docker push ${{ secrets.DOCKER_IMAGE_URL_CELERY }}:$GITHUB_SHA

      - name: Deploy to conpass-worker production Cloud Run production env
        run: |
          gcloud run deploy ${{ secrets.WORKER_SERVICE_NAME_PRODUCTION }} \
            --image ${{ secrets.DOCKER_IMAGE_URL_CELERY }}:$GITHUB_SHA \
            --platform managed \
            --region ${{ secrets.REGION }} \
            --allow-unauthenticated

      - name: Deploy to conpass-worker2 production Cloud Run production env
        run: |
          gcloud run deploy ${{ secrets.WORKER_2_SERVICE_NAME_PRODUCTION }} \
            --image ${{ secrets.DOCKER_IMAGE_URL_CELERY }}:$GITHUB_SHA \
            --platform managed \
            --region ${{ secrets.REGION }} \
            --allow-unauthenticated