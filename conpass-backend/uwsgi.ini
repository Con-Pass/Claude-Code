[uwsgi]
strict=true
http=0.0.0.0:8000
add-header=Connection: close
http-timeout = 300

###
# Module
###
chdir=/app/app
module=config.wsgi

###
# Monitoring
###
stats=0.0.0.0:1717
stats-http=true

###
# Performance
###
lazy-apps=true
enable-threads=true
# single-interpreter=true
master=true
vacuum=true
processes=3
threads=4
threads-stacksize=512
# max-requests=20000
reload-on-rss=4096
evil-reload-on-rss=3072
post-buffering=8192
reuse-port=true
thunder-lock=true
# spooler = %(chdir)/tasks
buffer-size=8192

###
# Harakiri
###
die-on-term=true
worker-reload-mercy=10
harakiri=300

###
# Log
###
logformat=time:%(ltime)	timestamp_us:%(tmicros) rss_memory_usage:%(rssM), address_space/virtual_memory_usage:%(vszM)  remote_addr:%(addr) x_forwarded_for:%(var.HTTP_X_FORWARDED_FOR)	x_forwarded_proto:%(var.HTTP_X_FORWARDED_PROTO)	method:%(method)	status:%(status)	user:%(user)	host:%(host)	path:%(var.PATH_INFO)	query:%(var.QUERY_STRING)	referer:%(referer)	taken_time_us:%(micros)	req_body_bytes:%(cl)	res_bytes:%(size)	res_body_bytes:%(rsize)	app_worker:%(wid)	accept_language:%(var.HTTP_ACCEPT_LANGUAGE)	user_agent:%(uagent)
log-date=%%Y-%%m-%%dT%%H:%%M:%%S%%z
