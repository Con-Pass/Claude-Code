[tox]
envlist = py38, flake8
skipsdist = True

[testenv:py38]
deps = pipenv
setenv = DJANGO_SETTINGS_MODULE = {env:DJANGO_SETTINGS_MODULE:config.settings.testing}
         PIPENV_VERBOSITY = -1
commands =
        pipenv install --dev
        pipenv run pytest tests/ --showlocals --junitxml=junit.xml --cov-report=html:htmlcov --cov=app {posargs:app }

[testenv:flake8]
deps = pipenv
commands =
        pipenv install --dev
        pipenv run lint --tee --output-file=flake8.txt

[pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = test_*.py tests.py
log_level = DEBUG
env_override_existing_values = 0
env_files =
    .env.testing
python_paths = app
filterwarnings =
    ignore:The following fields will be removed in the future

[flake8]
ignore = F401,F403
max-line-length = 160
exclude = app/conpass/migrations/*
